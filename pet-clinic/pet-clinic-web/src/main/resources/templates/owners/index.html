<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>List Of Pet Owners</title>
</head>
<body>
	<h1 th:text="'List of Pet Owners'">1</h1>

	<table>
		<thead>
			<tr>
				<th>Id</th>
				<th>First Name</th>
				<th>Last Name</th>
			</tr>
		</thead>
		<tbody>
			<tr th:each="owner: ${owners}">
				<td th:text="${owner?.id}">id</td>
				<td th:text="${owner?.firstName}">first name</td>
				<td th:text="${owner?.lastName}">last name</td>
			</tr>
		</tbody>
	</table>

</body>
</html>
